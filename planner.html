<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#082f49" />
  <title>Planner Inteligente | Willian Soares</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient-start: #0a1628; --bg-gradient-mid: #082f49; --bg-gradient-end: #0e3a5a;
      --text-primary: #e2e8f0; --text-secondary: #94a3b8; --text-light: #f1f5f9;
      --text-cyan-400: #22d3ee; --text-cyan-300: #67e8f9; --border-cyan-700: #0e7490;
      --glass-bg: rgba(255, 255, 255, 0.04); --glass-border: rgba(255, 255, 255, 0.08);
      --shadow-color: rgba(0, 0, 0, 0.4); --accent-pink: #f9a8d4;
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); min-height: 100vh; background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 55%, var(--bg-gradient-end) 100%); background-attachment: fixed; color: var(--text-primary); overflow-x: hidden; padding-top: 1rem; }

    .page { display: none; padding: 10px 16px 110px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px 0 var(--shadow-color); }
    .card-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text-cyan-300); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; border-bottom: 1px solid var(--border-cyan-700); padding-bottom: 8px; }

    /* Estilo do Calendário Corrigido */
    .annual-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .month-card { background: rgba(0,0,0,0.2); border-radius: 14px; border: 1px solid var(--glass-border); overflow: hidden; }
    .month-header { padding: 12px; font-weight: 800; font-size: 15px; text-align: center; color: var(--text-cyan-400); font-family: var(--font-display); text-transform: uppercase; background: rgba(34, 211, 238, 0.05); border-bottom: 1px solid var(--glass-border); }
    .month-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 12px; }
    .month-cal-header { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-align: center; }
    .month-cal-day { font-size: 12px; text-align: center; padding: 6px 0; border-radius: 6px; cursor: pointer; transition: 0.2s; color: var(--text-primary); }
    .month-cal-day:hover { background: rgba(34,211,238,0.15); }
    .month-cal-day.today { background: var(--text-cyan-400); color: var(--bg-gradient-start); font-weight: 800; }
    .month-cal-day.has-event { border: 1px solid var(--text-cyan-400); }

    /* Dashboard UI */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .stat-card { background: rgba(34, 211, 238, 0.03); border-radius: 16px; padding: 24px; border: 1px solid var(--border-cyan-700); text-align: center; }
    .stat-value { font-size: 42px; font-weight: 800; font-family: var(--font-display); color: var(--text-cyan-400); line-height: 1; margin-bottom: 8px; }
    .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

    /* Botões & Nav */
    .sync-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(10,22,40,0.6); border: 1px solid var(--border-cyan-700); border-radius: 12px; padding: 12px 16px; margin-bottom: 24px; }
    .btn-primary { background: linear-gradient(135deg, #06b6d4, #0891b2); border: none; border-radius: 8px; color: white; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-body); transition: 0.3s; }
    .btn-primary.alt { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-cyan-300); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(6,182,212,0.4); }

    .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,22,40,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; padding: 12px 0 25px; z-index: 100; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 11px; padding: 6px; border-radius: 12px; transition: 0.3s; font-family: var(--font-body); }
    .nav-btn.active { color: var(--text-cyan-400); }

    /* Mood, Tasks, Inputs */
    .daily-date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .day-number { font-family: var(--font-display); font-size: 40px; font-weight: 800; color: var(--text-light); }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.2); margin-bottom: 8px; }
    .task-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--text-cyan-400); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .task-check.checked { background: var(--text-cyan-400); }
    .task-check.checked::after { content: '✓'; color: #000; font-weight: 800; }
    .task-text { flex: 1; border: none; background: transparent; color: var(--text-light); outline: none; font-size: 14px; }
    .task-item.done .task-text { text-decoration: line-through; opacity: 0.5; }
    .time-block { display: flex; gap: 12px; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.2); border-left: 4px solid var(--border-cyan-700); margin-bottom: 6px; }
    .time-label { font-size: 12px; color: var(--text-cyan-300); font-weight: 700; min-width: 45px; }
    .time-input { border: none; background: transparent; color: #fff; outline: none; flex: 1; resize: none; font-family: inherit; }
    .notes-area { width: 100%; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); border-radius: 10px; padding: 14px; color: #fff; outline: none; min-height: 100px; }

    .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(10,22,40,0.95); border: 1px solid var(--text-cyan-400); color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 13px; opacity: 0; transition: 0.4s; z-index: 300; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.9); z-index: 400; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .loading-overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--text-cyan-400); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay"><div class="spinner"></div><div id="loading-msg" style="color:var(--text-cyan-400); font-family:var(--font-display);">SINCRONIZANDO</div></div>

<div id="page-daily" class="page active">
  <div class="page-header">
    <div class="daily-date-nav">
      <button class="btn-primary alt" style="border-radius:50%; width:40px; height:40px; padding:0" onclick="changeDay(-1)">‹</button>
      <div class="current-date-display">
        <div id="hdr-dayname" style="color:var(--text-cyan-400); font-weight:600; text-transform:uppercase; font-size:12px"></div>
        <div id="hdr-daynum" class="day-number"></div>
        <div id="hdr-monthyear" style="color:var(--text-secondary); font-size:12px"></div>
      </div>
      <button class="btn-primary alt" style="border-radius:50%; width:40px; height:40px; padding:0" onclick="changeDay(1)">›</button>
    </div>
  </div>
  <div style="text-align:center; margin-bottom: 20px;"><button class="btn-primary alt" onclick="goToday()">HOJE</button></div>

  <div class="sync-bar">
    <span>☁️ WORKSPACE CLOUD</span>
    <div style="display:flex; gap:8px">
      <button class="btn-primary" onclick="saveToCloud()">SALVAR</button>
      <button class="btn-primary alt" onclick="loadFromCloud()">BAIXAR</button>
    </div>
  </div>

  <div class="card"><div class="card-title">Energia do Dia</div><div id="mood-row" style="display:flex; gap:12px; justify-content:center"></div></div>
  <div class="card"><div class="card-title">Checklist</div><div id="task-list"></div><button class="btn-primary alt" style="margin-top:10px; width:100%" onclick="addTask()">+ ADICIONAR TAREFA</button></div>
  <div class="card"><div class="card-title">Timeboxing</div><div id="time-blocks"></div></div>
  <div class="card"><div class="card-title">Insights & Notas</div><textarea class="notes-area" id="notes-area" placeholder="O que você aprendeu hoje?"></textarea></div>
</div>

<div id="page-weekly" class="page">
  <div class="page-header"><div class="page-title">Sincronia Semanal</div></div>
  <div class="week-days-grid" id="week-days-grid"></div>
  <div class="card"><div class="card-title">Habit Tracker</div><div style="overflow-x:auto"><table class="habit-table" id="habit-table"></table></div></div>
</div>

<div id="page-annual" class="page">
  <div class="page-header"><div class="page-title">Calendário 2026</div></div>
  <div class="annual-grid" id="annual-grid"></div>
</div>

<div id="page-stats" class="page">
  <div class="page-header"><div class="page-title">Dashboard de Performance</div></div>
  <div id="stats-grid" class="stats-grid"></div>
  <div class="card"><div class="card-title">Consistência de Hábitos</div><div id="habit-stats"></div></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('daily',this)">📅 HOJE</button>
  <button class="nav-btn" onclick="showPage('weekly',this)">📆 SEMANA</button>
  <button class="nav-btn" onclick="showPage('annual',this)">🗓️ ANO</button>
  <button class="nav-btn" onclick="showPage('stats',this)">📊 STATS</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwkGrVVAqK4T5zFeRChX6XUyFh5dQKAceR2d4xu-SsVlKb_uudbj4PGNap_l-Su6RO5/exec';
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAY_NAMES = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
const MOODS = ['😴','😔','😐','😊','🤩'];
const TIME_SLOTS = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

let state = JSON.parse(localStorage.getItem('planner_v3') || 'null') || { days: {}, habits: [{id:'h1', name:'Leitura', icon:'📚'},{id:'h2', name:'Treino', icon:'🏃'},{id:'h3', name:'Estudos', icon:'🎓'}], habitLog: {}, events: [] };
let currentDate = new Date(); currentDate.setHours(0,0,0,0);

function saveLocal() { localStorage.setItem('planner_v3', JSON.stringify(state)); }
function dateKey(d) { return d.toISOString().split('T')[0]; }
function getDayData(d) { const k = dateKey(d); if(!state.days[k]) state.days[k] = { mood: null, tasks: [], blocks: {}, notes: '' }; return state.days[k]; }

// RENDERS
function renderDaily() {
  const d = currentDate; const day = getDayData(d);
  document.getElementById('hdr-dayname').textContent = new Intl.DateTimeFormat('pt-BR', {weekday:'long'}).format(d);
  document.getElementById('hdr-daynum').textContent = d.getDate().toString().padStart(2,'0');
  document.getElementById('hdr-monthyear').textContent = `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
  
  document.getElementById('mood-row').innerHTML = MOODS.map((m,i) => `<button class="mood-btn ${day.mood===i?'selected':''}" onclick="setMood(${i})">${m}</button>`).join('');
  document.getElementById('task-list').innerHTML = day.tasks.map((t,i) => `<div class="task-item ${t.done?'done':''}" onclick="toggleTask(${i})"><div class="task-check ${t.done?'checked':''}"></div><input class="task-text" value="${t.text}" oninput="updateTask(${i}, this.value)" onclick="event.stopPropagation()"></div>`).join('');
  document.getElementById('time-blocks').innerHTML = TIME_SLOTS.map(s => `<div class="time-block"><div class="time-label">${s}</div><textarea class="time-input" oninput="updateBlock('${s}', this)">${day.blocks[s]||''}</textarea></div>`).join('');
  document.getElementById('notes-area').value = day.notes || '';
}

function renderWeekly() {
  const grid = document.getElementById('week-days-grid'); grid.innerHTML = '';
  const start = new Date(currentDate); start.setDate(start.getDate() - start.getDay());
  for(let i=0; i<7; i++) {
    const d = new Date(start); d.setDate(d.getDate()+i); const isT = d.toDateString()===new Date().toDateString();
    const col = document.createElement('div'); col.className = `week-day-col ${isT?'today':''} ${d.toDateString()===currentDate.toDateString()?'selected':''}`;
    col.innerHTML = `<div class="wdc-name">${DAY_NAMES[i]}</div><div class="wdc-num">${d.getDate()}</div>`;
    col.onclick = () => { currentDate = d; showPage('daily', document.querySelector('.nav-btn')); };
    grid.appendChild(col);
  }
}

function renderAnnual() {
  const grid = document.getElementById('annual-grid'); grid.innerHTML = '';
  for(let m=0; m<12; m++) {
    const card = document.createElement('div'); card.className = 'month-card';
    card.innerHTML = `<div class="month-header">${MONTH_NAMES[m]}</div>`;
    const cal = document.createElement('div'); cal.className = 'month-cal-grid';
    const days = new Date(2026, m+1, 0).getDate();
    const start = new Date(2026, m, 1).getDay();
    for(let b=0; b<start; b++) cal.appendChild(document.createElement('div'));
    for(let d=1; d<=days; d++) {
      const dayDiv = document.createElement('div'); dayDiv.className = 'month-cal-day';
      if(new Date(2026,m,d).toDateString()===new Date().toDateString()) dayDiv.classList.add('today');
      dayDiv.textContent = d;
      dayDiv.onclick = () => { currentDate = new Date(2026,m,d); showPage('daily', document.querySelector('.nav-btn')); };
      cal.appendChild(dayDiv);
    }
    card.appendChild(cal); grid.appendChild(card);
  }
}

function renderStats() {
  const now = new Date();
  const yearMonthPrefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  let total = 0, done = 0;
  
  // CORREÇÃO: Filtra apenas as tarefas DO MÊS ATUAL
  Object.keys(state.days).forEach(key => {
    if(key.startsWith(yearMonthPrefix)) {
      state.days[key].tasks.forEach(t => {
        total++; if(t.done) done++;
      });
    }
  });

  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">Concluídas (Mês)</div></div>
    <div class="stat-card"><div class="stat-value">${pct}%</div><div class="stat-label">Eficiência Mensal</div></div>
  `;
}

// LOGIC
function setMood(i) { getDayData(currentDate).mood = i; saveLocal(); renderDaily(); }
function toggleTask(i) { const d = getDayData(currentDate); d.tasks[i].done = !d.tasks[i].done; saveLocal(); renderDaily(); }
function updateTask(i, v) { getDayData(currentDate).tasks[i].text = v; saveLocal(); }
function addTask() { getDayData(currentDate).tasks.push({text:'', done:false}); saveLocal(); renderDaily(); }
function updateBlock(s, el) { getDayData(currentDate).blocks[s] = el.value; saveLocal(); }
document.getElementById('notes-area').oninput = (e) => { getDayData(currentDate).notes = e.target.value; saveLocal(); };

// CLOUD
async function saveToCloud() {
  showLoading('SUBINDO DADOS...');
  try {
    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(state) });
    showToast('✅ SINCRONIZADO COM SUCESSO');
  } catch(e) { showToast('❌ ERRO NA REDE'); } finally { hideLoading(); }
}

async function loadFromCloud() {
  showLoading('BAIXANDO DADOS...');
  try {
    const r = await fetch(API_URL + "?t=" + Date.now());
    const d = await r.json();
    if(d && d.days) { state = d; saveLocal(); renderDaily(); showToast('✅ DADOS ATUALIZADOS'); }
  } catch(e) { showToast('❌ FALHA NO DOWNLOAD'); } finally { hideLoading(); }
}

function showPage(n, b) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active'); b.classList.add('active');
  if(n==='daily') renderDaily(); if(n==='weekly') renderWeekly(); if(n==='annual') renderAnnual(); if(n==='stats') renderStats();
}

function showLoading(m) { document.getElementById('loading-msg').textContent = m; document.getElementById('loading-overlay').classList.add('show'); }
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function changeDay(n) { currentDate.setDate(currentDate.getDate() + n); renderDaily(); }
function goToday() { currentDate = new Date(); currentDate.setHours(0,0,0,0); renderDaily(); }

renderDaily();
</script>
</body>
</html>
