<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#a78bfa" />
  <title>Planner 2026</title>
  <link rel="manifest" href="#" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #a78bfa;
      --primary-light: #ede9fe;
      --primary-dark: #7c3aed;
      --secondary: #93c5fd;
      --secondary-light: #dbeafe;
      --accent-pink: #f9a8d4;
      --accent-pink-light: #fce7f3;
      --accent-green: #86efac;
      --accent-green-light: #dcfce7;
      --accent-yellow: #fde68a;
      --accent-yellow-light: #fef9c3;
      --accent-teal: #5eead4;
      --accent-teal-light: #ccfbf1;
      --text: #1e1b4b;
      --text-light: #6b7280;
      --bg: #f5f3ff;
      --card: #ffffff;
      --border: #e9d5ff;
      --shadow: 0 2px 12px rgba(167,139,250,0.10);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    .nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-top: 1.5px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 18px;
      z-index: 100;
      box-shadow: 0 -2px 12px rgba(167,139,250,0.10);
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; background: none; border: none; cursor: pointer;
      color: var(--text-light); font-size: 11px; padding: 4px 12px;
      border-radius: 12px; transition: all 0.2s;
    }
    .nav-btn.active { color: var(--primary-dark); }
    .nav-btn.active .nav-icon { background: var(--primary-light); }
    .nav-icon {
      font-size: 22px; width: 44px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px; transition: background 0.2s;
    }

    /* PAGES */
    .page { display: none; padding: 20px 16px 90px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }

    /* HEADER */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title { font-size: 22px; font-weight: 700; color: var(--primary-dark); }
    .page-subtitle { font-size: 13px; color: var(--text-light); margin-top: 2px; }

    /* CARDS */
    .card {
      background: var(--card); border-radius: 16px;
      padding: 16px; margin-bottom: 14px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--text-light);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
    }

    /* ===== DAILY VIEW ===== */
    .daily-date-nav {
      display: flex; align-items: center; gap: 10px;
    }
    .date-arrow {
      background: var(--primary-light); border: none; border-radius: 50%;
      width: 34px; height: 34px; font-size: 18px; cursor: pointer;
      color: var(--primary-dark); display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .date-arrow:hover { background: var(--border); }
    .current-date-display {
      flex: 1; text-align: center;
    }
    .current-date-display .day-name {
      font-size: 13px; color: var(--text-light); text-transform: capitalize;
    }
    .current-date-display .day-number {
      font-size: 28px; font-weight: 800; color: var(--primary-dark); line-height: 1;
    }
    .current-date-display .month-year {
      font-size: 13px; color: var(--text-light);
    }

    /* TIME BLOCKS */
    .time-block-list { display: flex; flex-direction: column; gap: 6px; }
    .time-block {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 10px; border-radius: 10px;
      background: var(--bg); border-left: 3px solid var(--primary);
      cursor: pointer; transition: background 0.15s;
    }
    .time-block:hover { background: var(--primary-light); }
    .time-label {
      font-size: 11px; color: var(--text-light); font-weight: 600;
      min-width: 38px; padding-top: 2px;
    }
    .time-input {
      border: none; background: transparent; flex: 1;
      font-size: 13px; color: var(--text); outline: none;
      font-family: inherit; resize: none;
    }
    .time-input::placeholder { color: #c4b5fd; }

    /* TASK LIST */
    .task-list { display: flex; flex-direction: column; gap: 6px; }
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 10px; background: var(--bg);
      transition: background 0.15s;
    }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text-light); }
    .task-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--primary); background: transparent;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s;
    }
    .task-check.checked { background: var(--primary); border-color: var(--primary); }
    .task-check.checked::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
    .task-text {
      flex: 1; border: none; background: transparent; font-size: 13px;
      color: var(--text); outline: none; font-family: inherit;
    }
    .task-text::placeholder { color: #c4b5fd; }
    .task-delete {
      background: none; border: none; color: #fca5a5;
      cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0;
      transition: opacity 0.2s;
    }
    .task-item:hover .task-delete { opacity: 1; }
    .add-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; color: var(--primary);
      font-size: 13px; font-weight: 600; cursor: pointer;
      padding: 6px 4px; margin-top: 4px;
    }

    /* NOTES */
    .notes-area {
      width: 100%; border: none; background: var(--bg);
      border-radius: 10px; padding: 10px 12px;
      font-size: 13px; color: var(--text); font-family: inherit;
      resize: vertical; min-height: 80px; outline: none;
    }
    .notes-area::placeholder { color: #c4b5fd; }

    /* MOOD */
    .mood-row {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .mood-btn {
      font-size: 26px; background: var(--bg); border: 2px solid transparent;
      border-radius: 12px; width: 48px; height: 48px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .mood-btn.selected { border-color: var(--primary); background: var(--primary-light); }

    /* ===== WEEKLY VIEW ===== */
    .week-nav {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .week-label { flex: 1; text-align: center; font-weight: 700; color: var(--primary-dark); }
    .week-days-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
      margin-bottom: 14px;
    }
    .week-day-col {
      background: var(--card); border-radius: 12px; padding: 8px 4px;
      text-align: center; border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; min-height: 80px;
    }
    .week-day-col:hover { border-color: var(--primary); }
    .week-day-col.today { border-color: var(--primary); background: var(--primary-light); }
    .week-day-col.selected { border-color: var(--primary-dark); background: var(--primary-light); }
    .wdc-name { font-size: 10px; color: var(--text-light); font-weight: 600; text-transform: uppercase; }
    .wdc-num { font-size: 20px; font-weight: 800; color: var(--primary-dark); }
    .wdc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-pink); margin: 4px auto 0; }
    .wdc-dot.hidden { opacity: 0; }

    /* HABIT TRACKER */
    .habit-grid { overflow-x: auto; }
    .habit-table { width: 100%; border-collapse: collapse; }
    .habit-table th {
      font-size: 10px; color: var(--text-light); font-weight: 600;
      text-transform: uppercase; padding: 4px 6px; text-align: center;
    }
    .habit-table td { padding: 4px 6px; }
    .habit-name-cell {
      font-size: 12px; font-weight: 600; color: var(--text);
      white-space: nowrap; padding-right: 10px !important;
    }
    .habit-check {
      width: 26px; height: 26px; border-radius: 8px;
      border: 2px solid var(--border); background: transparent;
      cursor: pointer; margin: 0 auto; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s;
      font-size: 13px;
    }
    .habit-check.done { background: var(--accent-green); border-color: var(--accent-green); }
    .habit-row:nth-child(even) td { background: var(--bg); }

    /* ADD HABIT */
    .add-habit-row {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .habit-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit;
      background: var(--bg);
    }
    .habit-input:focus { border-color: var(--primary); }
    .icon-input {
      width: 50px; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 6px; font-size: 16px; text-align: center; outline: none;
      background: var(--bg);
    }
    .btn-primary {
      background: var(--primary); color: white; border: none;
      border-radius: 10px; padding: 8px 16px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger {
      background: #fca5a5; color: #7f1d1d; border: none;
      border-radius: 8px; padding: 4px 8px; font-size: 11px;
      cursor: pointer;
    }

    /* ===== ANNUAL VIEW ===== */
    .annual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }
    .month-card {
      background: var(--card); border-radius: 14px;
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--shadow);
    }
    .month-header {
      padding: 10px 14px; font-weight: 700; font-size: 14px;
      color: white;
    }
    .month-cal {
      padding: 8px;
    }
    .month-cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .month-cal-header {
      font-size: 9px; font-weight: 700; color: var(--text-light);
      text-align: center; padding: 2px 0;
      text-transform: uppercase;
    }
    .month-cal-day {
      font-size: 11px; text-align: center; padding: 3px 1px;
      border-radius: 6px; cursor: pointer; transition: background 0.15s;
      line-height: 1.4;
    }
    .month-cal-day:hover { background: var(--primary-light); }
    .month-cal-day.today { background: var(--primary); color: white; font-weight: 700; }
    .month-cal-day.has-event { font-weight: 700; color: var(--primary-dark); }
    .month-cal-day.has-event::after {
      content: ''; display: block; width: 4px; height: 4px;
      border-radius: 50%; background: var(--accent-pink);
      margin: 0 auto;
    }
    .month-colors {
      background: #f9a8d4; /* jan */
    }

    /* EVENT LIST */
    .event-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 10px;
      background: var(--bg); margin-bottom: 6px;
    }
    .event-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .event-info { flex: 1; }
    .event-date { font-size: 11px; color: var(--text-light); }
    .event-name { font-size: 13px; font-weight: 600; }
    .event-delete {
      background: none; border: none; color: #fca5a5;
      cursor: pointer; font-size: 16px;
    }

    /* ADD EVENT */
    .add-event-form {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .form-input {
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 12px; font-size: 13px; outline: none;
      font-family: inherit; background: var(--bg); flex: 1; min-width: 120px;
    }
    .form-input:focus { border-color: var(--primary); }

    /* ===== STATS ===== */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--card); border-radius: 14px; padding: 14px;
      border: 1px solid var(--border); text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-value { font-size: 32px; font-weight: 800; color: var(--primary-dark); }
    .stat-label { font-size: 12px; color: var(--text-light); margin-top: 2px; }

    .habit-progress { margin-bottom: 10px; }
    .hp-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .hp-name { font-size: 13px; font-weight: 600; }
    .hp-pct { font-size: 13px; color: var(--primary-dark); font-weight: 700; }
    .hp-bar { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; }
    .hp-fill { height: 100%; border-radius: 99px; background: var(--primary); transition: width 0.4s; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(30,27,75,0.35);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border-radius: 24px 24px 0 0;
      padding: 20px 20px 36px; width: 100%; max-width: 600px;
      transform: translateY(100%); transition: transform 0.3s;
      max-height: 85vh; overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 0 auto 16px;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; color: var(--primary-dark); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--primary-dark); color: white; padding: 10px 20px;
      border-radius: 99px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (min-width: 600px) {
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .week-days-grid { gap: 10px; }
    }
  </style>
</head>
<body>

<!-- PAGES -->
<div id="page-daily" class="page active">
  <div class="page-header">
    <div class="daily-date-nav" style="width:100%">
      <button class="date-arrow" onclick="changeDay(-1)">‹</button>
      <div class="current-date-display" style="flex:1">
        <div class="day-name" id="hdr-dayname"></div>
        <div class="day-number" id="hdr-daynum"></div>
        <div class="month-year" id="hdr-monthyear"></div>
      </div>
      <button class="date-arrow" onclick="changeDay(1)">›</button>
      <button class="date-arrow" onclick="goToday()" style="font-size:13px;width:auto;padding:0 10px;border-radius:10px;">Hoje</button>
    </div>
  </div>

  <!-- MOOD -->
  <div class="card">
    <div class="card-title">😊 Como você está?</div>
    <div class="mood-row" id="mood-row"></div>
  </div>

  <!-- TASKS -->
  <div class="card">
    <div class="card-title">✅ Tarefas do dia</div>
    <div class="task-list" id="task-list"></div>
    <button class="add-btn" onclick="addTask()">＋ Adicionar tarefa</button>
  </div>

  <!-- TIME BLOCKS -->
  <div class="card">
    <div class="card-title">🕐 Blocos de tempo</div>
    <div class="time-block-list" id="time-blocks"></div>
  </div>

  <!-- NOTES -->
  <div class="card">
    <div class="card-title">📝 Notas do dia</div>
    <textarea class="notes-area" id="notes-area" placeholder="Escreva algo sobre o seu dia..." rows="4"></textarea>
  </div>
</div>

<div id="page-weekly" class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Semana</div>
      <div class="page-subtitle" id="week-range-label"></div>
    </div>
  </div>
  <div class="week-nav">
    <button class="date-arrow" onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="week-label"></div>
    <button class="date-arrow" onclick="changeWeek(1)">›</button>
  </div>
  <div class="week-days-grid" id="week-days-grid"></div>

  <!-- HABIT TRACKER -->
  <div class="card">
    <div class="card-title">🌱 Tracker de Hábitos</div>
    <div class="habit-grid">
      <table class="habit-table" id="habit-table"></table>
    </div>
    <div class="add-habit-row">
      <input class="habit-input" id="new-habit-name" placeholder="Novo hábito..." />
      <input class="icon-input" id="new-habit-icon" placeholder="🏃" maxlength="2" />
      <button class="btn-primary" onclick="addHabit()">＋</button>
    </div>
  </div>
</div>

<div id="page-annual" class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Calendário 2026</div>
      <div class="page-subtitle">Visão anual completa</div>
    </div>
    <button class="btn-primary" onclick="openAddEvent()">＋ Evento</button>
  </div>
  <div class="annual-grid" id="annual-grid"></div>
</div>

<div id="page-stats" class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Estatísticas</div>
      <div class="page-subtitle">Seu progresso este mês</div>
    </div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="card">
    <div class="card-title">📊 Hábitos este mês</div>
    <div id="habit-stats"></div>
  </div>
  <div class="card">
    <div class="card-title">🗓️ Próximos eventos</div>
    <div id="upcoming-events"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('daily',this)">
    <div class="nav-icon">📅</div>Hoje
  </button>
  <button class="nav-btn" onclick="showPage('weekly',this)">
    <div class="nav-icon">📆</div>Semana
  </button>
  <button class="nav-btn" onclick="showPage('annual',this)">
    <div class="nav-icon">🗓️</div>Ano
  </button>
  <button class="nav-btn" onclick="showPage('stats',this)">
    <div class="nav-icon">📊</div>Stats
  </button>
</nav>

<!-- MODAL: Add Event -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Novo Evento</div>
    <div class="add-event-form">
      <input class="form-input" id="evt-date" type="date" style="flex:0 0 auto;width:150px;" />
      <input class="form-input" id="evt-name" placeholder="Nome do evento..." />
      <input class="form-input" id="evt-icon" placeholder="🎂" maxlength="2" style="flex:0 0 auto;width:60px;" />
      <input class="form-input" id="evt-color" type="color" value="#a78bfa" style="flex:0 0 auto;width:60px;padding:4px;" />
      <button class="btn-primary" onclick="saveEvent()" style="width:100%">Salvar evento</button>
    </div>
    <div id="event-list" style="margin-top:16px;"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===================== STATE =====================
let state = JSON.parse(localStorage.getItem('planner_v2') || 'null') || {
  days: {},       // { 'YYYY-MM-DD': { mood, tasks, blocks, notes } }
  habits: [
    { id: 'h1', name: 'Leitura', icon: '📚' },
    { id: 'h2', name: 'Estudos', icon: '🎓' },
    { id: 'h3', name: 'Exercício', icon: '🏃' },
    { id: 'h4', name: 'Água', icon: '💧' },
    { id: 'h5', name: 'Meditação', icon: '🧘' },
  ],
  habitLog: {},   // { 'YYYY-MM-DD': { habitId: bool } }
  events: [],     // [{ id, date, name, icon, color }]
};

const MONTH_COLORS = [
  '#f9a8d4','#93c5fd','#86efac','#fde68a',
  '#c4b5fd','#5eead4','#fdba74','#a5f3fc',
  '#fb923c','#86efac','#f472b6','#818cf8'
];

const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAY_NAMES_FULL = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const MOODS = ['😴','😔','😐','😊','🤩'];
const TIME_SLOTS = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00',
  '13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

let currentDate = new Date();
currentDate.setHours(0,0,0,0);
let currentWeekStart = getWeekStart(new Date());

function save() {
  localStorage.setItem('planner_v2', JSON.stringify(state));
}

function dateKey(d) {
  return d.toISOString().slice(0,10);
}

function getDay(d) {
  const k = dateKey(d);
  if (!state.days[k]) state.days[k] = {
    mood: null,
    tasks: [],
    blocks: {},
    notes: ''
  };
  return state.days[k];
}

function getWeekStart(d) {
  const day = new Date(d);
  day.setHours(0,0,0,0);
  const dow = day.getDay();
  day.setDate(day.getDate() - dow);
  return day;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() &&
    d.getMonth() === t.getMonth() &&
    d.getDate() === t.getDate();
}

// ===================== NAVIGATION =====================
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'daily') renderDaily();
  if (name === 'weekly') renderWeekly();
  if (name === 'annual') renderAnnual();
  if (name === 'stats') renderStats();
}

// ===================== DAILY =====================
function changeDay(n) {
  currentDate = addDays(currentDate, n);
  renderDaily();
}
function goToday() {
  currentDate = new Date();
  currentDate.setHours(0,0,0,0);
  renderDaily();
}

function renderDaily() {
  const d = currentDate;
  document.getElementById('hdr-dayname').textContent = DAY_NAMES_FULL[d.getDay()];
  document.getElementById('hdr-daynum').textContent = d.getDate();
  document.getElementById('hdr-monthyear').textContent =
    MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();

  renderMood();
  renderTasks();
  renderTimeBlocks();
  renderNotes();
}

function renderMood() {
  const day = getDay(currentDate);
  const row = document.getElementById('mood-row');
  row.innerHTML = '';
  MOODS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn' + (day.mood === i ? ' selected' : '');
    btn.textContent = m;
    btn.onclick = () => {
      day.mood = i;
      save();
      renderMood();
    };
    row.appendChild(btn);
  });
}

function renderTasks() {
  const day = getDay(currentDate);
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  day.tasks.forEach((task, idx) => {
    const item = document.createElement('div');
    item.className = 'task-item' + (task.done ? ' done' : '');
    const check = document.createElement('div');
    check.className = 'task-check' + (task.done ? ' checked' : '');
    check.onclick = () => { task.done = !task.done; save(); renderTasks(); };
    const input = document.createElement('input');
    input.className = 'task-text';
    input.value = task.text;
    input.placeholder = 'Tarefa...';
    input.oninput = () => { task.text = input.value; save(); };
    const del = document.createElement('button');
    del.className = 'task-delete';
    del.textContent = '✕';
    del.onclick = () => { day.tasks.splice(idx, 1); save(); renderTasks(); };
    item.appendChild(check);
    item.appendChild(input);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function addTask() {
  const day = getDay(currentDate);
  day.tasks.push({ text: '', done: false });
  save();
  renderTasks();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.task-text');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function renderTimeBlocks() {
  const day = getDay(currentDate);
  const list = document.getElementById('time-blocks');
  list.innerHTML = '';
  TIME_SLOTS.forEach(slot => {
    const block = document.createElement('div');
    block.className = 'time-block';
    const label = document.createElement('div');
    label.className = 'time-label';
    label.textContent = slot;
    const input = document.createElement('textarea');
    input.className = 'time-input';
    input.placeholder = 'O que fazer...';
    input.rows = 1;
    input.value = day.blocks[slot] || '';
    input.oninput = () => {
      day.blocks[slot] = input.value;
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
      save();
    };
    if (day.blocks[slot]) {
      setTimeout(() => {
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
      }, 10);
    }
    block.appendChild(label);
    block.appendChild(input);
    list.appendChild(block);
  });
}

function renderNotes() {
  const day = getDay(currentDate);
  const area = document.getElementById('notes-area');
  area.value = day.notes || '';
  area.oninput = () => { day.notes = area.value; save(); };
}

// ===================== WEEKLY =====================
function changeWeek(n) {
  currentWeekStart = addDays(currentWeekStart, n * 7);
  renderWeekly();
}

function renderWeekly() {
  const ws = currentWeekStart;
  const we = addDays(ws, 6);
  document.getElementById('week-label').textContent =
    MONTH_NAMES[ws.getMonth()].slice(0,3) + ' ' + ws.getDate() +
    ' – ' + MONTH_NAMES[we.getMonth()].slice(0,3) + ' ' + we.getDate();
  document.getElementById('week-range-label').textContent =
    ws.getFullYear();

  const grid = document.getElementById('week-days-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = addDays(ws, i);
    const k = dateKey(d);
    const dayData = state.days[k];
    const hasTasks = dayData && dayData.tasks && dayData.tasks.length > 0;
    const col = document.createElement('div');
    col.className = 'week-day-col' +
      (isToday(d) ? ' today' : '') +
      (dateKey(d) === dateKey(currentDate) ? ' selected' : '');
    col.innerHTML = `
      <div class="wdc-name">${DAY_NAMES[d.getDay()]}</div>
      <div class="wdc-num">${d.getDate()}</div>
      <div class="wdc-dot ${hasTasks ? '' : 'hidden'}"></div>
    `;
    col.onclick = () => {
      currentDate = new Date(d);
      document.querySelectorAll('.week-day-col').forEach(c => c.classList.remove('selected'));
      col.classList.add('selected');
      showPage('daily', document.querySelector('.nav-btn'));
    };
    grid.appendChild(col);
  }

  renderHabitTracker();
}

function renderHabitTracker() {
  const table = document.getElementById('habit-table');
  const days = [];
  for (let i = 0; i < 7; i++) days.push(addDays(currentWeekStart, i));

  let html = '<thead><tr><th class="habit-name-cell">Hábito</th>';
  days.forEach(d => {
    html += `<th>${DAY_NAMES[d.getDay()]}<br><span style="font-weight:400">${d.getDate()}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  state.habits.forEach(habit => {
    html += `<tr class="habit-row">
      <td class="habit-name-cell">${habit.icon} ${habit.name}
        <button class="btn-danger" onclick="removeHabit('${habit.id}')" style="margin-left:4px;font-size:10px">✕</button>
      </td>`;
    days.forEach(d => {
      const k = dateKey(d);
      const done = state.habitLog[k] && state.habitLog[k][habit.id];
      html += `<td><div class="habit-check ${done ? 'done' : ''}"
        onclick="toggleHabit('${habit.id}','${k}',this)">
        ${done ? '✓' : ''}
      </div></td>`;
    });
    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;
}

function toggleHabit(habitId, dateKey, el) {
  if (!state.habitLog[dateKey]) state.habitLog[dateKey] = {};
  state.habitLog[dateKey][habitId] = !state.habitLog[dateKey][habitId];
  el.className = 'habit-check' + (state.habitLog[dateKey][habitId] ? ' done' : '');
  el.textContent = state.habitLog[dateKey][habitId] ? '✓' : '';
  save();
}

function addHabit() {
  const name = document.getElementById('new-habit-name').value.trim();
  const icon = document.getElementById('new-habit-icon').value.trim() || '⭐';
  if (!name) return;
  state.habits.push({ id: 'h' + Date.now(), name, icon });
  save();
  document.getElementById('new-habit-name').value = '';
  document.getElementById('new-habit-icon').value = '';
  renderHabitTracker();
  showToast('Hábito adicionado!');
}

function removeHabit(id) {
  state.habits = state.habits.filter(h => h.id !== id);
  save();
  renderHabitTracker();
}

// ===================== ANNUAL =====================
function renderAnnual() {
  const grid = document.getElementById('annual-grid');
  grid.innerHTML = '';
  const today = new Date();

  for (let m = 0; m < 12; m++) {
    const card = document.createElement('div');
    card.className = 'month-card';

    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.style.background = MONTH_COLORS[m];
    hdr.style.color = '#1e1b4b';
    hdr.textContent = MONTH_NAMES[m] + ' 2026';
    card.appendChild(hdr);

    const cal = document.createElement('div');
    cal.className = 'month-cal';
    const calGrid = document.createElement('div');
    calGrid.className = 'month-cal-grid';

    DAY_NAMES.forEach(dn => {
      const h = document.createElement('div');
      h.className = 'month-cal-header';
      h.textContent = dn[0];
      calGrid.appendChild(h);
    });

    const firstDay = new Date(2026, m, 1).getDay();
    for (let blank = 0; blank < firstDay; blank++) {
      calGrid.appendChild(document.createElement('div'));
    }

    const daysInMonth = new Date(2026, m + 1, 0).getDate();
    for (let day = 1; day <= daysInMonth; day++) {
      const dObj = new Date(2026, m, day);
      const k = dateKey(dObj);
      const hasEvent = state.events.some(e => e.date === k);
      const dayDiv = document.createElement('div');
      dayDiv.className = 'month-cal-day' +
        (today.getFullYear() === 2026 && today.getMonth() === m && today.getDate() === day ? ' today' : '') +
        (hasEvent ? ' has-event' : '');
      dayDiv.textContent = day;
      dayDiv.onclick = () => {
        currentDate = new Date(2026, m, day);
        showPage('daily', document.querySelector('.nav-btn'));
      };
      calGrid.appendChild(dayDiv);
    }

    cal.appendChild(calGrid);
    card.appendChild(cal);
    grid.appendChild(card);
  }

  renderEventList();
}

function openAddEvent() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('evt-date').value = today;
  document.getElementById('evt-name').value = '';
  document.getElementById('evt-icon').value = '';
  document.getElementById('modal-event').classList.add('open');
  renderEventList();
}

function saveEvent() {
  const date = document.getElementById('evt-date').value;
  const name = document.getElementById('evt-name').value.trim();
  const icon = document.getElementById('evt-icon').value.trim() || '📌';
  const color = document.getElementById('evt-color').value;
  if (!date || !name) { showToast('Preencha data e nome!'); return; }
  state.events.push({ id: 'e' + Date.now(), date, name, icon, color });
  save();
  document.getElementById('evt-name').value = '';
  renderEventList();
  renderAnnual();
  showToast('Evento salvo!');
}

function renderEventList() {
  const list = document.getElementById('event-list');
  if (!list) return;
  const sorted = [...state.events].sort((a,b) => a.date.localeCompare(b.date));
  list.innerHTML = sorted.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    return `<div class="event-item">
      <div class="event-dot" style="background:${e.color}"></div>
      <div class="event-info">
        <div class="event-date">${d.getDate()} ${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getFullYear()}</div>
        <div class="event-name">${e.icon} ${e.name}</div>
      </div>
      <button class="event-delete" onclick="deleteEvent('${e.id}')">✕</button>
    </div>`;
  }).join('') || '<p style="color:var(--text-light);font-size:13px">Nenhum evento ainda.</p>';
}

function deleteEvent(id) {
  state.events = state.events.filter(e => e.id !== id);
  save();
  renderEventList();
  renderAnnual();
}

// Close modal on overlay click
document.getElementById('modal-event').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// ===================== STATS =====================
function renderStats() {
  const today = new Date();
  const y = today.getFullYear();
  const mo = today.getMonth();
  const daysInMonth = new Date(y, mo + 1, 0).getDate();

  let totalTasks = 0, doneTasks = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const k = dateKey(new Date(y, mo, d));
    const day = state.days[k];
    if (day && day.tasks) {
      totalTasks += day.tasks.length;
      doneTasks += day.tasks.filter(t => t.done).length;
    }
  }

  const taskPct = totalTasks ? Math.round(doneTasks / totalTasks * 100) : 0;
  const events = state.events.filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d >= today;
  }).sort((a,b) => a.date.localeCompare(b.date)).slice(0,5);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${doneTasks}</div>
      <div class="stat-label">Tarefas concluídas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${taskPct}%</div>
      <div class="stat-label">Taxa de conclusão</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${state.habits.length}</div>
      <div class="stat-label">Hábitos ativos</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${state.events.length}</div>
      <div class="stat-label">Eventos salvos</div>
    </div>
  `;

  const habitStats = document.getElementById('habit-stats');
  habitStats.innerHTML = state.habits.map(habit => {
    let done = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const k = dateKey(new Date(y, mo, d));
      if (state.habitLog[k] && state.habitLog[k][habit.id]) done++;
    }
    const pct = Math.round(done / daysInMonth * 100);
    return `<div class="habit-progress">
      <div class="hp-header">
        <div class="hp-name">${habit.icon} ${habit.name}</div>
        <div class="hp-pct">${done}/${daysInMonth} · ${pct}%</div>
      </div>
      <div class="hp-bar"><div class="hp-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('') || '<p style="color:var(--text-light);font-size:13px">Nenhum hábito cadastrado.</p>';

  document.getElementById('upcoming-events').innerHTML = events.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    return `<div class="event-item">
      <div class="event-dot" style="background:${e.color}"></div>
      <div class="event-info">
        <div class="event-date">${d.getDate()} ${MONTH_NAMES[d.getMonth()].slice(0,3)}</div>
        <div class="event-name">${e.icon} ${e.name}</div>
      </div>
    </div>`;
  }).join('') || '<p style="color:var(--text-light);font-size:13px">Nenhum evento futuro.</p>';
}

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===================== INIT =====================
renderDaily();
</script>
</body>
</html>
