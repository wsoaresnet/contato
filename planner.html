<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#082f49" />
  <title>Planner Inteligente | Willian Soares</title>

  <!-- Google Fonts: Syne e DM Sans, conforme seu portfólio -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================
       1. VARIÁVEIS DE TEMA (Baseado no seu Portfólio)
       ========================================================== */
    :root {
      --bg-gradient-start: #0a1628;
      --bg-gradient-mid: #082f49;
      --bg-gradient-end: #0e3a5a;
      
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-light: #f1f5f9;
      
      --text-cyan-400: #22d3ee;
      --text-cyan-300: #67e8f9;
      --border-cyan-700: #0e7490;
      
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow-color: rgba(0, 0, 0, 0.4);
      
      --accent-pink: #f9a8d4;
      --accent-green: #86efac;
      
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ==========================================================
       2. BASE & BACKGROUND
       ========================================================== */
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 55%, var(--bg-gradient-end) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      overflow-x: hidden;
      padding-top: 1rem;
    }

    /* Scrollbar estilizada */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--text-cyan-400); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg-gradient-start); }

    /* ==========================================================
       3. TYPOGRAPHY & TITLES
       ========================================================== */
    .page-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text-cyan-400);
    }
    .page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    
    .card-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-cyan-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-cyan-700);
      padding-bottom: 8px;
    }

    /* ==========================================================
       4. ESTRUTURA (CARDS & PAGES) - GLASSMORPHISM
       ========================================================== */
    .page { display: none; padding: 10px 16px 100px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px 0 var(--shadow-color);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .card:hover { border-color: rgba(34,211,238,0.25); }

    /* ==========================================================
       5. COMPONENTES DO DAILY (Hoje)
       ========================================================== */
    .daily-date-nav { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .current-date-display { flex: 1; text-align: center; }
    
    .day-number {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      color: var(--text-light);
      line-height: 1.1;
      text-shadow: 0 0 10px rgba(34,211,238,0.3);
    }
    .day-name { font-size: 14px; color: var(--text-cyan-400); text-transform: capitalize; font-weight: 600; }
    .month-year { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

    .date-arrow {
      background: rgba(34,211,238,0.1);
      border: 1px solid var(--glass-border);
      border-radius: 50%; width: 38px; height: 38px;
      font-size: 18px; cursor: pointer; color: var(--text-cyan-400);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .date-arrow:hover { background: var(--text-cyan-400); color: var(--bg-gradient-start); transform: scale(1.05); }

    /* Barra Nuvem (Sync) */
    .sync-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,22,40,0.6);
      border: 1px solid var(--border-cyan-700);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .sync-bar span { font-weight: 600; color: var(--text-light); font-size: 13px; }

    /* Botões Primários */
    .btn-primary {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      border: none; border-radius: 8px; color: white;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(6,182,212,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(6,182,212,0.4); background: linear-gradient(135deg, #22d3ee, #06b6d4); }
    .btn-primary.alt { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-cyan-300); }
    .btn-primary.alt:hover { background: rgba(34,211,238,0.1); border-color: var(--text-cyan-400); }

    /* Mood row */
    .mood-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .mood-btn {
      font-size: 28px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      border-radius: 50%; width: 50px; height: 50px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .mood-btn.selected { background: rgba(34,211,238,0.15); border-color: var(--text-cyan-400); transform: scale(1.1); box-shadow: 0 0 15px rgba(34,211,238,0.3); }

    /* Tasks */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      border-radius: 10px; background: rgba(0,0,0,0.2); border: 1px solid transparent;
      transition: background 0.2s;
    }
    .task-item:hover { background: rgba(0,0,0,0.4); border-color: var(--glass-border); }
    .task-check {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--text-cyan-400); background: transparent;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .task-check.checked { background: var(--text-cyan-400); border-color: var(--text-cyan-400); }
    .task-check.checked::after { content: '✓'; color: var(--bg-gradient-start); font-size: 14px; font-weight: 800; }
    .task-text { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--text-light); outline: none; font-family: inherit; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text-secondary); }
    
    .add-btn {
      background: none; border: none; color: var(--text-cyan-300);
      font-size: 13px; font-weight: 600; cursor: pointer; padding: 8px 4px; margin-top: 4px;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .add-btn:hover { color: var(--text-cyan-400); }

    /* Time Blocks */
    .time-block-list { display: flex; flex-direction: column; gap: 8px; }
    .time-block {
      display: flex; align-items: flex-start; gap: 12px; padding: 10px;
      border-radius: 10px; background: rgba(0,0,0,0.2);
      border-left: 4px solid var(--border-cyan-700);
      transition: background 0.2s, border-color 0.2s;
    }
    .time-block:hover { background: rgba(0,0,0,0.4); border-color: var(--text-cyan-400); }
    .time-label { font-size: 12px; color: var(--text-cyan-300); font-weight: 700; min-width: 45px; padding-top: 2px; }
    .time-input {
      border: none; background: transparent; flex: 1; font-size: 14px; color: var(--text-light);
      outline: none; font-family: inherit; resize: none; min-height: 24px;
    }
    .time-input::placeholder { color: var(--text-secondary); }

    /* Notes */
    .notes-area {
      width: 100%; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2);
      border-radius: 10px; padding: 14px; font-size: 14px; color: var(--text-light);
      font-family: inherit; resize: vertical; min-height: 100px; outline: none;
      transition: border-color 0.2s;
    }
    .notes-area:focus { border-color: var(--text-cyan-400); background: rgba(0,0,0,0.3); }
    .notes-area::placeholder { color: var(--text-secondary); }

    /* ==========================================================
       6. WEEKLY (Semana & Hábitos)
       ========================================================== */
    .week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .week-label { flex: 1; text-align: center; font-weight: 700; font-family: var(--font-display); color: var(--text-cyan-300); font-size: 18px; }
    
    .week-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 24px; }
    .week-day-col {
      background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px 4px;
      text-align: center; border: 1px solid var(--glass-border);
      cursor: pointer; transition: all 0.2s; min-height: 85px; display: flex; flex-direction: column; justify-content: center;
    }
    .week-day-col:hover { border-color: var(--text-cyan-400); background: rgba(34,211,238,0.05); }
    .week-day-col.selected { border-color: var(--text-cyan-300); background: rgba(34,211,238,0.1); box-shadow: inset 0 0 10px rgba(34,211,238,0.1); }
    .week-day-col.today { border-color: var(--accent-pink); }
    .wdc-name { font-size: 10px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .wdc-num { font-size: 22px; font-weight: 800; font-family: var(--font-display); color: var(--text-light); margin: 4px 0; }
    .wdc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-cyan-400); margin: 0 auto; }
    .wdc-dot.hidden { opacity: 0; }

    /* Habit Tracker */
    .habit-grid { overflow-x: auto; padding-bottom: 10px; }
    .habit-table { width: 100%; border-collapse: collapse; min-width: 500px; }
    .habit-table th { font-size: 10px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; padding: 8px 4px; text-align: center; border-bottom: 1px solid var(--glass-border); }
    .habit-table td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.02); }
    .habit-name-cell { font-size: 13px; font-weight: 600; color: var(--text-light); white-space: nowrap; padding-right: 15px !important; text-align: left; }
    .habit-check {
      width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.3); cursor: pointer; margin: 0 auto; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s; font-size: 14px; color: var(--bg-gradient-start);
    }
    .habit-check.done { background: var(--text-cyan-400); border-color: var(--text-cyan-400); font-weight: 800; box-shadow: 0 0 10px rgba(34,211,238,0.4); }
    
    .add-habit-row { display: flex; gap: 10px; margin-top: 16px; }
    .habit-input { flex: 1; border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px 14px; font-size: 13px; outline: none; background: rgba(0,0,0,0.2); color: var(--text-light); }
    .icon-input { width: 60px; border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; font-size: 16px; text-align: center; outline: none; background: rgba(0,0,0,0.2); color: var(--text-light); }
    .habit-input:focus, .icon-input:focus { border-color: var(--text-cyan-400); }

    /* ==========================================================
       7. ANNUAL (Calendário)
       ========================================================== */
    .annual-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .month-card { background: rgba(0,0,0,0.15); border-radius: 14px; border: 1px solid var(--glass-border); overflow: hidden; }
    .month-header { padding: 12px; font-weight: 800; font-size: 14px; text-align: center; color: var(--bg-gradient-start); font-family: var(--font-display); text-transform: uppercase; letter-spacing: 1px; }
    .month-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 12px; }
    .month-cal-header { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-align: center; padding-bottom: 6px; }
    .month-cal-day { font-size: 12px; text-align: center; padding: 6px 0; border-radius: 6px; cursor: pointer; transition: background 0.2s; color: var(--text-primary); }
    .month-cal-day:hover { background: rgba(34,211,238,0.15); }
    .month-cal-day.today { background: var(--text-cyan-400); color: var(--bg-gradient-start); font-weight: 800; box-shadow: 0 0 10px rgba(34,211,238,0.4); }
    .month-cal-day.has-event { border: 1px solid var(--text-cyan-400); font-weight: 700; }

    /* Events List */
    .event-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); margin-bottom: 8px; }
    .event-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }
    .event-info { flex: 1; }
    .event-date { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .event-name { font-size: 14px; font-weight: 600; color: var(--text-light); margin-top: 2px; }

    /* ==========================================================
       8. STATS (Estatísticas)
       ========================================================== */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .stat-card { background: rgba(0,0,0,0.2); border-radius: 16px; padding: 20px; border: 1px solid var(--glass-border); text-align: center; }
    .stat-value { font-size: 36px; font-weight: 800; font-family: var(--font-display); color: var(--text-cyan-400); text-shadow: 0 0 15px rgba(34,211,238,0.2); line-height: 1; margin-bottom: 8px; }
    .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

    .habit-progress { margin-bottom: 16px; }
    .hp-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px; }
    .hp-name { font-size: 14px; font-weight: 600; color: var(--text-light); }
    .hp-pct { font-size: 12px; color: var(--text-cyan-300); font-weight: 700; }
    .hp-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; }
    .hp-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #0891b2, #22d3ee); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

    /* ==========================================================
       9. NAV INFERIOR (Bottom Bar)
       ========================================================== */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,22,40,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around;
      padding: 12px 0 20px; z-index: 100;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer; color: var(--text-secondary);
      font-size: 11px; padding: 6px 16px; border-radius: 12px; transition: all 0.3s;
      font-family: var(--font-body); font-weight: 500;
    }
    .nav-icon { font-size: 20px; transition: transform 0.3s; }
    .nav-btn.active { color: var(--text-cyan-400); }
    .nav-btn.active .nav-icon { transform: translateY(-4px); text-shadow: 0 0 10px rgba(34,211,238,0.5); }
    .nav-btn:hover { color: var(--text-light); }

    /* ==========================================================
       10. UTILS (Modal, Toast, Loader)
       ========================================================== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.8); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--bg-gradient-mid); border: 1px solid var(--glass-border); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 600px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 85vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); margin: 0 auto 20px; }
    
    .form-input { border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; background: rgba(0,0,0,0.2); color: var(--text-light); flex: 1; min-width: 120px; transition: border 0.3s; }
    .form-input:focus { border-color: var(--text-cyan-400); }

    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(10,22,40,0.95); border: 1px solid var(--text-cyan-400); color: var(--text-light); padding: 12px 24px; border-radius: 99px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 300; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4); font-family: var(--font-body); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.9); z-index: 400; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--text-cyan-400); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-family: var(--font-display); font-weight: 700; color: var(--text-cyan-300); letter-spacing: 1px; }
  </style>
</head>
<body>

<!-- Loader -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-msg">Sincronizando...</div>
</div>

<!-- ==============================================
     PAGE: DAILY (Hoje)
     ============================================== -->
<div id="page-daily" class="page active">
  
  <div class="page-header">
    <div class="daily-date-nav">
      <button class="date-arrow" onclick="changeDay(-1)">‹</button>
      <div class="current-date-display">
        <div id="hdr-dayname" class="day-name"></div>
        <div id="hdr-daynum" class="day-number"></div>
        <div id="hdr-monthyear" class="month-year"></div>
      </div>
      <button class="date-arrow" onclick="changeDay(1)">›</button>
    </div>
  </div>
  <!-- Botão Hoje fora da linha principal para melhor alinhamento -->
  <div style="text-align:center; margin-top:-10px; margin-bottom: 24px;">
    <button class="btn-primary alt" style="border-radius: 20px; padding: 4px 16px; font-size:11px;" onclick="goToday()">Ir para Hoje</button>
  </div>

  <!-- NUVEM SYNC -->
  <div class="sync-bar">
    <span>☁️ Workspace Cloud</span>
    <div style="display: flex; gap: 8px;">
      <button class="btn-primary" onclick="saveToCloud()">Salvar</button>
      <button class="btn-primary alt" onclick="loadFromCloud()">Baixar</button>
    </div>
  </div>

  <!-- MOOD -->
  <div class="card">
    <div class="card-title">Como está sua energia?</div>
    <div class="mood-row" id="mood-row"></div>
  </div>

  <!-- TASKS -->
  <div class="card">
    <div class="card-title">Checklist do Dia</div>
    <div id="task-list" class="task-list"></div>
    <button class="add-btn" onclick="addTask()">+ Adicionar Nova Tarefa</button>
  </div>

  <!-- TIME BLOCKS -->
  <div class="card">
    <div class="card-title">Agenda (Timeboxing)</div>
    <div id="time-blocks" class="time-block-list"></div>
  </div>

  <!-- NOTES -->
  <div class="card">
    <div class="card-title">Anotações Livres</div>
    <textarea class="notes-area" id="notes-area" placeholder="Brainstorming, ideias, links importantes..."></textarea>
  </div>
</div>

<!-- ==============================================
     PAGE: WEEKLY (Semana & Hábitos)
     ============================================== -->
<div id="page-weekly" class="page">
  <div class="page-header"><div class="page-title">Visão Semanal</div></div>
  
  <div class="week-nav">
    <button class="date-arrow" onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="week-label"></div>
    <button class="date-arrow" onclick="changeWeek(1)">›</button>
  </div>
  
  <div class="week-days-grid" id="week-days-grid"></div>

  <div class="card">
    <div class="card-title">Rastreador de Hábitos</div>
    <div class="habit-grid"><table class="habit-table" id="habit-table"></table></div>
    <div class="add-habit-row">
      <input class="form-input" id="new-habit-name" placeholder="Novo hábito..." />
      <input class="form-input" id="new-habit-icon" placeholder="Ícone" style="min-width: 60px; max-width: 70px; text-align: center;" />
      <button class="btn-primary" style="padding: 10px 16px;" onclick="addHabit()">Add</button>
    </div>
  </div>
</div>

<!-- ==============================================
     PAGE: ANNUAL (Calendário)
     ============================================== -->
<div id="page-annual" class="page">
  <div class="page-header">
    <div class="page-title">Calendário 2026</div>
    <button class="btn-primary" onclick="openAddEvent()">+ Evento</button>
  </div>
  <div class="annual-grid" id="annual-grid"></div>
</div>

<!-- ==============================================
     PAGE: STATS (Estatísticas)
     ============================================== -->
<div id="page-stats" class="page">
  <div class="page-header"><div class="page-title">Performance</div></div>
  <div id="stats-grid" class="stats-grid"></div>
  
  <div class="card">
    <div class="card-title">Consistência de Hábitos (Mês)</div>
    <div id="habit-stats"></div>
  </div>
  
  <div class="card">
    <div class="card-title">Próximos Marcos / Eventos</div>
    <div id="upcoming-events"></div>
  </div>
</div>

<!-- ==============================================
     MODAL DE EVENTOS E TOAST
     ============================================== -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 style="font-family: var(--font-display); color: var(--text-cyan-300); margin-bottom: 20px;">Adicionar Evento</h3>
    <div class="add-event-form">
      <input class="form-input" id="evt-date" type="date" />
      <input class="form-input" id="evt-name" placeholder="Nome do evento..." />
      <input class="form-input" id="evt-icon" placeholder="📍" style="min-width: 60px; max-width: 70px; text-align:center;" />
      <input class="form-input" id="evt-color" type="color" value="#22d3ee" style="min-width: 60px; max-width: 70px; padding: 4px;" />
      <button class="btn-primary" onclick="saveEvent()" style="width:100%; margin-top: 10px; padding: 12px;">Salvar Evento</button>
    </div>
    <div id="event-list" style="margin-top:24px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ==============================================
     NAVBAR BOTTOM
     ============================================== -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('daily',this)"><div class="nav-icon">📅</div>Hoje</button>
  <button class="nav-btn" onclick="showPage('weekly',this)"><div class="nav-icon">📆</div>Semana</button>
  <button class="nav-btn" onclick="showPage('annual',this)"><div class="nav-icon">🗓️</div>Ano</button>
  <button class="nav-btn" onclick="showPage('stats',this)"><div class="nav-icon">📊</div>Dashboard</button>
</nav>

<!-- ==============================================
     JAVASCRIPT (Lógica Original Intacta)
     ============================================== -->
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwkGrVVAqK4T5zFeRChX6XUyFh5dQKAceR2d4xu-SsVlKb_uudbj4PGNap_l-Su6RO5/exec';

let state = JSON.parse(localStorage.getItem('planner_v3') || 'null') || {
    days: {},
    habits: [
        { id: 'h1', name: 'Leitura Tech', icon: '📚' },
        { id: 'h2', name: 'Estudos', icon: '🎓' },
        { id: 'h3', name: 'Atividade Física', icon: '🏃' },
        { id: 'h4', name: 'Água', icon: '💧' }
    ],
    habitLog: {},
    events: []
};

// Cores baseadas no gradiente do projeto para os meses
const MONTH_COLORS = ['#0891b2','#0e7490','#155e75','#082f49','#0a1628','#0e3a5a','#0891b2','#0e7490','#155e75','#082f49','#0a1628','#0e3a5a'];
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MOODS = ['😴','😔','😐','😊','🤩'];
const TIME_SLOTS = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

let currentDate = new Date(); currentDate.setHours(0,0,0,0);
let currentWeekStart = new Date(currentDate); currentWeekStart.setDate(currentDate.getDate() - currentDate.getDay());
let isSyncing = false;

// NUVEM (NO-CORS e FETCH)
async function saveToCloud() {
    showLoading('Gravando dados...');
    try {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(state) });
        showToast('✅ Upload Concluído');
    } catch(e) {
        showToast('❌ Falha na conexão');
    } finally { hideLoading(); }
}
async function loadFromCloud() {
    showLoading('Sincronizando...');
    try {
        const response = await fetch(API_URL + "?t=" + new Date().getTime());
        const text = await response.text();
        if (text.includes("<html")) throw new Error("Bloqueio");
        const data = JSON.parse(text);
        if (data && data.days) { state = data; saveLocal(); renderAllActive(); showToast('✅ Banco atualizado'); }
    } catch(e) {
        showToast('❌ Erro no download');
    } finally { hideLoading(); }
}
function renderAllActive() {
    if (document.getElementById('page-daily').classList.contains('active')) renderDaily();
    if (document.getElementById('page-weekly').classList.contains('active')) renderWeekly();
    if (document.getElementById('page-annual').classList.contains('active')) renderAnnual();
    if (document.getElementById('page-stats').classList.contains('active')) renderStats();
}

// LÓGICA CORE
function getDayData(d) {
    const k = d.toISOString().split('T')[0];
    if (!state.days[k]) state.days[k] = { mood: null, tasks: [], blocks: {}, notes: '' };
    return state.days[k];
}
function dateKey(d) { return d.toISOString().split('T')[0]; }
function saveLocal() { localStorage.setItem('planner_v3', JSON.stringify(state)); }

// RENDERS
function renderDaily() {
    const day = getDayData(currentDate);
    const options = { weekday: 'long' };
    document.getElementById('hdr-dayname').textContent = new Intl.DateTimeFormat('pt-BR', options).format(currentDate);
    document.getElementById('hdr-daynum').textContent = currentDate.getDate().toString().padStart(2, '0');
    document.getElementById('hdr-monthyear').textContent = `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
    
    document.getElementById('mood-row').innerHTML = MOODS.map((m, i) => `<button class="mood-btn ${day.mood === i ? 'selected' : ''}" onclick="setMood(${i})">${m}</button>`).join('');
    document.getElementById('task-list').innerHTML = day.tasks.map((t, i) => `<div class="task-item ${t.done ? 'done' : ''}"><div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${i})"></div><input class="task-text" value="${t.text}" placeholder="O que precisa ser feito?" oninput="updateTask(${i}, this.value)"><button onclick="deleteTask(${i})" style="border:none; background:none; color:var(--text-secondary); cursor:pointer;">✕</button></div>`).join('');
    document.getElementById('time-blocks').innerHTML = TIME_SLOTS.map(slot => `<div class="time-block"><div class="time-label">${slot}</div><textarea class="time-input" placeholder="Livre" oninput="updateBlock('${slot}', this)">${day.blocks[slot] || ''}</textarea></div>`).join('');
    document.getElementById('notes-area').value = day.notes || '';
}

function renderWeekly() {
    const grid = document.getElementById('week-days-grid');
    grid.innerHTML = '';
    const start = new Date(currentWeekStart);
    const end = new Date(start); end.setDate(end.getDate() + 6);
    document.getElementById('week-label').textContent = `${MONTH_NAMES[start.getMonth()].substring(0,3)} ${start.getDate()} - ${MONTH_NAMES[end.getMonth()].substring(0,3)} ${end.getDate()}`;

    for (let i = 0; i < 7; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const col = document.createElement('div');
        const isToday = d.toDateString() === new Date().toDateString();
        const isSelected = d.toDateString() === currentDate.toDateString();
        col.className = `week-day-col ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`;
        col.innerHTML = `<div class="wdc-name">${DAY_NAMES[i]}</div><div class="wdc-num">${d.getDate()}</div><div class="wdc-dot ${getDayData(d).tasks.length ? '' : 'hidden'}"></div>`;
        col.onclick = () => { currentDate = d; showPage('daily', document.querySelector('.nav-btn')); };
        grid.appendChild(col);
    }
    renderHabits();
}

function renderHabits() {
    const table = document.getElementById('habit-table');
    let html = '<tr><th style="text-align:left">Hábito</th>' + DAY_NAMES.map(n => `<th>${n}</th>`).join('') + '</tr>';
    state.habits.forEach(h => {
        html += `<tr><td class="habit-name-cell">${h.icon} ${h.name} <span onclick="removeHabit('${h.id}')" style="color:#ef4444; font-size:10px; cursor:pointer; margin-left:4px;">✕</span></td>`;
        for(let i=0; i<7; i++) {
            const d = new Date(currentWeekStart); d.setDate(d.getDate() + i);
            const k = dateKey(d);
            const done = state.habitLog[k] && state.habitLog[k][h.id];
            html += `<td><div class="habit-check ${done?'done':''}" onclick="toggleHabit('${h.id}','${k}')">${done?'✓':''}</div></td>`;
        }
        html += '</tr>';
    });
    table.innerHTML = html;
}

function renderAnnual() {
    const grid = document.getElementById('annual-grid');
    grid.innerHTML = '';
    for (let m = 0; m < 12; m++) {
        const card = document.createElement('div');
        card.className = 'month-card';
        card.innerHTML = `<div class="month-header" style="background:${MONTH_COLORS[m]}">${MONTH_NAMES[m]}</div>`;
        const cal = document.createElement('div');
        cal.className = 'month-cal-grid';
        DAY_NAMES.forEach(dn => cal.innerHTML += `<div class="month-cal-header">${dn.charAt(0)}</div>`);
        const days = new Date(2026, m + 1, 0).getDate();
        const startDay = new Date(2026, m, 1).getDay();
        for(let b=0; b<startDay; b++) cal.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const dateStr = dateKey(new Date(2026,m,d));
            const hasEvent = state.events.some(e => e.date === dateStr);
            const isToday = new Date(2026,m,d).toDateString() === new Date().toDateString();
            const dayDiv = document.createElement('div');
            dayDiv.className = `month-cal-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}`;
            dayDiv.textContent = d;
            dayDiv.onclick = () => { currentDate = new Date(2026,m,d); showPage('daily', document.querySelector('.nav-btn')); };
            cal.appendChild(dayDiv);
        }
        card.appendChild(cal);
        grid.appendChild(card);
    }
    renderEventList();
}

function renderStats() {
    const grid = document.getElementById('stats-grid');
    const y = new Date().getFullYear(); const mo = new Date().getMonth(); const daysInMonth = new Date(y, mo + 1, 0).getDate();
    let total = 0, done = 0;
    for (let d = 1; d <= daysInMonth; d++) { const day = state.days[dateKey(new Date(y, mo, d))]; if(day) day.tasks.forEach(t => { total++; if(t.done) done++; }); }
    const pct = total ? Math.round((done/total)*100) : 0;
    
    grid.innerHTML = `<div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">Tarefas no Mês</div></div><div class="stat-card"><div class="stat-value">${pct}%</div><div class="stat-label">Conclusão</div></div>`;
    
    document.getElementById('habit-stats').innerHTML = state.habits.map(h => {
        let hDone = 0; for (let d = 1; d <= daysInMonth; d++) { if(state.habitLog[dateKey(new Date(y, mo, d))]?.[h.id]) hDone++; }
        const hPct = Math.round((hDone/daysInMonth)*100);
        return `<div class="habit-progress"><div class="hp-header"><div class="hp-name">${h.icon} ${h.name}</div><div class="hp-pct">${hPct}%</div></div><div class="hp-bar"><div class="hp-fill" style="width:${hPct}%"></div></div></div>`;
    }).join('');

    const upcEvents = [...state.events].filter(e => new Date(e.date+'T00:00') >= new Date()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);
    document.getElementById('upcoming-events').innerHTML = upcEvents.length ? upcEvents.map(e => {
        const d = new Date(e.date+'T00:00'); return `<div class="event-item"><div class="event-dot" style="background:${e.color}"></div><div class="event-info"><div class="event-name">${e.icon} ${e.name}</div><div class="event-date">${d.getDate()} de ${MONTH_NAMES[d.getMonth()]}</div></div><button onclick="deleteEvent('${e.id}')" style="border:none;background:none;color:#ef4444;">✕</button></div>`;
    }).join('') : '<div style="font-size:13px; color:var(--text-secondary)">Sem eventos futuros.</div>';
}

function renderEventList() {
    const list = document.getElementById('event-list'); if(!list) return;
    const sorted = [...state.events].sort((a,b) => a.date.localeCompare(b.date));
    list.innerHTML = sorted.map(e => `<div class="event-item"><div class="event-dot" style="background:${e.color}"></div><div class="event-info"><div class="event-name">${e.icon} ${e.name}</div><div class="event-date" style="font-size:10px">${e.date}</div></div><button onclick="deleteEvent('${e.id}')" style="border:none;background:none;color:#ef4444;">✕</button></div>`).join('');
}

// ACOES INTERATIVAS
function setMood(i) { getDayData(currentDate).mood = i; saveLocal(); renderDaily(); }
function toggleTask(i) { const d = getDayData(currentDate); d.tasks[i].done = !d.tasks[i].done; saveLocal(); renderDaily(); }
function updateTask(i, v) { getDayData(currentDate).tasks[i].text = v; saveLocal(); }
function deleteTask(i) { getDayData(currentDate).tasks.splice(i,1); saveLocal(); renderDaily(); }
function addTask() { getDayData(currentDate).tasks.push({text:'', done:false}); saveLocal(); renderDaily(); }
function updateBlock(s, el) { getDayData(currentDate).blocks[s] = el.value; el.style.height='auto'; el.style.height=el.scrollHeight+'px'; saveLocal(); }
document.getElementById('notes-area').addEventListener('input', e => { getDayData(currentDate).notes = e.target.value; saveLocal(); });

function changeDay(n) { currentDate.setDate(currentDate.getDate() + n); renderDaily(); }
function goToday() { currentDate = new Date(); currentDate.setHours(0,0,0,0); currentWeekStart = new Date(currentDate); currentWeekStart.setDate(currentDate.getDate() - currentDate.getDay()); renderDaily(); }
function changeWeek(n) { currentWeekStart.setDate(currentWeekStart.getDate() + n*7); renderWeekly(); }

function toggleHabit(id, k) { if(!state.habitLog[k]) state.habitLog[k] = {}; state.habitLog[k][id] = !state.habitLog[k][id]; saveLocal(); renderHabits(); }
function addHabit() { const n = document.getElementById('new-habit-name').value; const i = document.getElementById('new-habit-icon').value || '📌'; if(n) { state.habits.push({id: 'h'+Date.now(), name: n, icon: i}); saveLocal(); renderHabits(); document.getElementById('new-habit-name').value=''; } }
function removeHabit(id) { state.habits = state.habits.filter(h => h.id !== id); saveLocal(); renderHabits(); }

function openAddEvent() { document.getElementById('modal-event').classList.add('open'); renderEventList(); }
function saveEvent() { const d = document.getElementById('evt-date').value; const n = document.getElementById('evt-name').value; const i = document.getElementById('evt-icon').value || '📍'; const c = document.getElementById('evt-color').value; if(d&&n) { state.events.push({id:'e'+Date.now(), date:d, name:n, icon:i, color:c}); saveLocal(); renderAnnual(); document.getElementById('evt-name').value=''; showToast('Evento Salvo!'); } }
function deleteEvent(id) { state.events = state.events.filter(e => e.id !== id); saveLocal(); renderEventList(); renderAnnual(); if(document.getElementById('page-stats').classList.contains('active')) renderStats(); }
document.getElementById('modal-event').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });

// UTIL
function showPage(n, b) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('page-'+n).classList.add('active'); b.classList.add('active'); if(n === 'daily') renderDaily(); if(n === 'weekly') renderWeekly(); if(n === 'annual') renderAnnual(); if(n === 'stats') renderStats(); window.scrollTo(0,0); }
function showLoading(m) { document.getElementById('loading-msg').textContent = m; document.getElementById('loading-overlay').classList.add('show'); }
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

// INIT
renderDaily();
</script>
</body>
</html>
